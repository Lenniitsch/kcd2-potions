<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Kingdom Come: Deliverance 2 Potion Brewing Guide — recipes, ingredients, and interactive Kuttenberg maps">
    <meta name="theme-color" content="#000713" media="(prefers-color-scheme: dark)">
    <meta name="theme-color" content="#f1ecd8" media="(prefers-color-scheme: light)">
    <meta name="theme-color" id="theme-color-meta" content="#000713">
    <meta name="msapplication-TileColor" content="#000713">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="KCD2 Guide">
    <link rel="icon" type="image/x-icon" href="assets/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="assets/img/icons/icon-72x72.png">
    <link rel="apple-touch-icon" href="assets/img/icons/icon-192x192.png">
    <link rel="manifest" href="manifest.json">

    <title>KCD2 Potion Guide</title>

    <script>
        (function () {
            try {
                var stored = localStorage.getItem('kcd2-theme');
                if (stored === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else if (stored === 'light') {
                    document.documentElement.setAttribute('data-theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme',
                        window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
                }
                var meta = document.querySelector('#theme-color-meta');
                var active = document.documentElement.getAttribute('data-theme');
                if (meta) meta.setAttribute('content', active === 'dark' ? '#000713' : '#f1ecd8');
                var storedLang = localStorage.getItem('kcd2-lang');
                if (storedLang && /^(de|it|en)$/.test(storedLang)) {
                    document.documentElement.setAttribute('lang', storedLang);
                }
            } catch (e) {}
        })();
    </script>

    <link rel="stylesheet" href="css/tailwind.css">
    <link rel="stylesheet" href="css/vendor/zoomist.css">
    <link rel="stylesheet" href="css/style.css">

    <script type="module" src="pwa-registration.js"></script>
</head>
<body class="bg-kcd-bg text-kcd-text font-sans antialiased min-h-screen">

    <div id="app" class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8"></div>

    <script src="js/vendor/zoomist.umd.js"></script>
    <script type="module" src="js/main.js"></script>
    <button id="back-to-top" aria-label="Back to top" class="kcd-back-to-top hidden">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
    </button>
</body>
</html>
